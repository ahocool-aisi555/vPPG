<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Web vPPG - MediaPipe</title>
  <!-- MediaPipe Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; }
    .container { position: relative; display: inline-block; margin-top: 20px; }
    #output_canvas { border-radius: 10px; border: 3px solid #444; }
    .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; text-align: left; }
    .bpm-value { font-size: 2em; color: #00ff00; font-weight: bold; }
  </style>
</head>
<body>
  <h1>vPPG Heart Rate Monitor</h1>
  <div class="container">
    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>
    
    <div class="overlay">
      <div id="bpm_text">BPM: <span class="bpm-value">--</span></div>
      <div id="status">Status: Menunggu Kamera...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
