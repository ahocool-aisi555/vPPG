<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web vPPG - Heart Rate Detector</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        canvas { border: 2px solid #00ff00; border-radius: 10px; max-width: 100%; }
        .stats { font-size: 24px; margin-top: 20px; color: #00ff00; }
    </style>
</head>
<body>
    <h2>vPPG Heart Rate Detector (Web JS)</h2>
    <video id="videoInput" width="640" height="480" style="display:none"></video>
    <canvas id="canvasOutput"></canvas>
    <div class="stats">
        <span id="bpmDisplay">Stabilizing...</span> | 
        <span id="status">Loading OpenCV...</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
